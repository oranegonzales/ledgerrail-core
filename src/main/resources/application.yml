server:
  port: ${PORT:8080}
  shutdown: graceful

spring:
  application:
    name: ledgerrail-core
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ledgerrail}
    username: ${DATABASE_USERNAME:ledgerrail}
    password: ${DATABASE_PASSWORD:local-development-password}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 0
      connection-timeout: 5000
      idle-timeout: 60000
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
        sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
        sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}
        ssl.truststore.type: ${KAFKA_SSL_TRUSTSTORE_TYPE:PEM}
        ssl.truststore.location: ${KAFKA_SSL_TRUSTSTORE_LOCATION:}
  lifecycle:
    timeout-per-shutdown-phase: 20s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: LedgerRail Core
    version: 0.2.0
    description: Sandbox transaction and ledger API

ledgerrail:
  security:
    api-key: ${PORTFOLIO_API_KEY:local-development-key}
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    topic: ${KAFKA_TOPIC:transfer.completed.v1}
    batch-size: 20
    max-attempts: 8
    poll-interval-ms: 2000
    initial-delay-ms: 5000
    send-timeout: 10s
    lease-timeout: 5m
    initial-backoff: 2s
    max-backoff: 5m

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level correlationId=%X{correlationId:-none} %logger{36} - %msg%n"
