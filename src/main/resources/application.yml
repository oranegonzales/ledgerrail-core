server:
  port: ${PORT:8080}
  shutdown: graceful
  forward-headers-strategy: none
  max-http-request-header-size: 8KB
  compression:
    enabled: true
    min-response-size: 1KB
    mime-types: application/json,application/problem+json,text/html,text/css,application/javascript
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
  tomcat:
    max-http-form-post-size: 16KB
    max-swallow-size: 1MB

spring:
  application:
    name: ledgerrail-core
  threads:
    virtual:
      enabled: true
  jackson:
    deserialization:
      fail-on-trailing-tokens: true
      fail-on-unknown-properties: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ledgerrail}
    username: ${DATABASE_USERNAME:ledgerrail}
    password: ${DATABASE_PASSWORD:local-development-password}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 0
      connection-timeout: 5000
      idle-timeout: 60000
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
        sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
        sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}
        ssl.truststore.type: ${KAFKA_SSL_TRUSTSTORE_TYPE:PEM}
        ssl.truststore.location: ${KAFKA_SSL_TRUSTSTORE_LOCATION:}
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record
  lifecycle:
    timeout-per-shutdown-phase: 20s

management:
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: LedgerRail Core
    version: 0.4.0
    description: Sandbox transaction and ledger API

ledgerrail:
  security:
    api-key: ${PORTFOLIO_API_KEY}
    public-demo:
      enabled: ${PUBLIC_DEMO_ENABLED:true}
      requests-per-minute: ${PUBLIC_DEMO_REQUESTS_PER_MINUTE:60}
      writes-per-day: ${PUBLIC_DEMO_WRITES_PER_DAY:500}
      trust-forwarded-for: ${PUBLIC_DEMO_TRUST_FORWARDED_FOR:false}
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    consumer-enabled: ${KAFKA_CONSUMER_ENABLED:false}
    consumer-group: ${KAFKA_CONSUMER_GROUP:ledgerrail-reconciliation-v1}
    topic: ${KAFKA_TOPIC:transfer.completed.v1}
    batch-size: 20
    max-attempts: 8
    poll-interval-ms: 2000
    initial-delay-ms: 5000
    send-timeout: 10s
    lease-timeout: 5m
    initial-backoff: 2s
    max-backoff: 5m

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level correlationId=%X{correlationId:-none} %logger{36} - %msg%n"
