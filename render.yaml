services:
  - type: web
    name: ledgerrail-core
    runtime: docker
    plan: free
    region: virginia
    autoDeployTrigger: checksPass
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: PORTFOLIO_API_KEY
        generateValue: true
      - key: PUBLIC_DEMO_ENABLED
        value: "true"
      - key: PUBLIC_DEMO_REQUESTS_PER_MINUTE
        value: "60"
      - key: PUBLIC_DEMO_WRITES_PER_DAY
        value: "500"
      - key: PUBLIC_DEMO_TRUST_FORWARDED_FOR
        value: "true"
      - key: KAFKA_ENABLED
        value: "false"
      - key: KAFKA_CONSUMER_ENABLED
        value: "false"
      - key: JAVA_TOOL_OPTIONS
        value: -Xms64m -Xmx256m -XX:MaxMetaspaceSize=128m -XX:ReservedCodeCacheSize=48m -XX:+UseSerialGC
